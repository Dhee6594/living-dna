version: 2
updates:
  # The engine is stdlib-only; this covers dev tooling (ruff) if it lands in pyproject.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]

  # Web UI dependencies.
  - package-ecosystem: npm
    directory: "/webapp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "webapp"]

  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
